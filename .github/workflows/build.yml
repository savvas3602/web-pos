name: CI - Build Check

# ──────────────────────────────────────────────────────────────────────────────
# Runs on every push / PR to master.
# Purpose: fast feedback (compile + test) without the full deploy pipeline.
# Path filters keep it scoped so unrelated changes don't waste runner minutes.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [master]
    paths:
      - "pos-api/**"
      - "pos-web/**"
  pull_request:
    branches: [master]
    paths:
      - "pos-api/**"
      - "pos-web/**"

jobs:
  # ── REST API ────────────────────────────────────────────────────────────────
  build-rest-api:
    name: Rest API — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build & test
        working-directory: pos-api
        run: |
          chmod +x mvnw
          ./mvnw verify -B

  # ── Web App ─────────────────────────────────────────────────────────────────
  build-web-app:
    name: Web App — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: pos-web/package-lock.json

      - name: Install dependencies
        working-directory: pos-web
        run: npm ci

      - name: Run tests
        working-directory: pos-web
        run: npm test

      - name: Type-check & build
        working-directory: pos-web
        run: npm run build

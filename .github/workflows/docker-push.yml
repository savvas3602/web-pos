name: Docker — Build & Push

# ──────────────────────────────────────────────────────────────────────────────
# Builds and pushes Docker images to DockerHub on push to master.
# Images are tagged with commit SHA and only pushed if their respective
# service (rest-api or web-app) has been updated.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ cicid ]
    paths:
      - "pos-api/**"
      - "pos-web/**"
      - "web-pos-docker/**"

jobs:
  # ── Detect Changes ──────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    outputs:
      rest-api: ${{ steps.changes.outputs.rest-api }}
      web-app: ${{ steps.changes.outputs.web-app }}
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Preflight Docker secrets (safe)
        shell: bash
        env:
          DOCKER_USERNAME: "savvas25"
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          set -euo pipefail

          # Fail fast if secrets are missing/empty
          [ -n "${DOCKER_USERNAME:-}" ] || { echo "DOCKER_USERNAME is empty"; exit 1; }
          [ -n "${DOCKER_TOKEN:-}" ] || { echo "DOCKER_TOKEN is empty"; exit 1; }

          # Mask values and print only non-sensitive diagnostics
          echo "${DOCKER_USERNAME}"
          echo "${DOCKER_TOKEN}"
          echo "username_length=${#DOCKER_USERNAME}"
          echo "token_length=${#DOCKER_TOKEN}"

      - name: Verify login via Docker CLI (same creds)
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          set -euo pipefail
          echo "$DOCKER_TOKEN" | docker login -u "$DOCKER_USERNAME" --password-stdin
          docker logout

      - name: Get Commit SHA
        id: commit
        run: echo "sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        run: |
          # Compare with previous commit to detect changes
          if git diff --quiet HEAD~1 -- pos-api/ web-pos-docker/rest-api/; then
            echo "rest-api=false" >> $GITHUB_OUTPUT
          else
            echo "rest-api=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --quiet HEAD~1 -- pos-web/ web-pos-docker/web-app/; then
            echo "web-app=false" >> $GITHUB_OUTPUT
          else
            echo "web-app=true" >> $GITHUB_OUTPUT
          fi

  # ── REST API ────────────────────────────────────────────────────────────────
  push-rest-api:
    name: Docker — Push REST API
    needs: detect-changes
    if: needs.detect-changes.outputs.rest-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1
        with:
          username: savvas25
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push REST API image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./pos-api
          file: ./web-pos-docker/rest-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k2-pos-rest-api:${{ needs.detect-changes.outputs.commit-sha }}
            ${{ secrets.DOCKER_USERNAME }}/k2-pos-rest-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Web App ─────────────────────────────────────────────────────────────────
  push-web-app:
    name: Docker — Push Web-App
    needs: detect-changes
    if: needs.detect-changes.outputs.web-app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4.1
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push Web-App image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./pos-web
          file: ./web-pos-docker/web-app/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/k2-pos-web-app:${{ needs.detect-changes.outputs.commit-sha }}
            ${{ secrets.DOCKER_USERNAME }}/k2-pos-web-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Docker — Build & Push

# ──────────────────────────────────────────────────────────────────────────────
# Builds and pushes Docker images to DockerHub on push to master.
# Images are tagged with commit SHA and only pushed if their respective
# service (rest-api or web-app) has been updated.
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ cicid ]

jobs:
  # ── Detect Changes ──────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Service Changes
    runs-on: ubuntu-latest
    outputs:
      rest-api: ${{ steps.changes.outputs.rest-api }}
      web-app: ${{ steps.changes.outputs.web-app }}
      commit-sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Commit SHA
        id: commit
        run: echo "sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Detect changes
        id: changes
        run: |
          # Compare with previous commit to detect changes
          if git diff --quiet HEAD~1 -- pos-api/ web-pos-docker/rest-api/; then
            echo "rest-api=false" >> $GITHUB_OUTPUT
          else
            echo "rest-api=true" >> $GITHUB_OUTPUT
          fi

          if git diff --quiet HEAD~1 -- pos-web/ web-pos-docker/web-app/; then
            echo "web-app=false" >> $GITHUB_OUTPUT
          else
            echo "web-app=true" >> $GITHUB_OUTPUT
          fi

  # ── REST API ────────────────────────────────────────────────────────────────
  push-rest-api:
    name: Docker — Push REST API
    needs: detect-changes
    if: needs.detect-changes.outputs.rest-api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: dckr_pat_0hK9iX9hjH8vkD5y64YQ_Hup7jQ

      - name: Build and push REST API image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./pos-api
          file: ./web-pos-docker/rest-api/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/k2-pos-rest-api:${{ needs.detect-changes.outputs.commit-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Web App ─────────────────────────────────────────────────────────────────
  push-web-app:
    name: Docker — Push Web-App
    needs: detect-changes
    if: needs.detect-changes.outputs.web-app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build & push Web-App image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./pos-web
          file: ./web-pos-docker/web-app/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/k2-pos-web-app:${{ needs.detect-changes.outputs.commit-sha }}
            ${{ vars.DOCKER_USERNAME }}/k2-pos-web-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

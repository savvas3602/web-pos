spring.datasource.url=jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop

app.security.jwt.secret=TestKeyThatIsLongEnoughForDevPurposesOnly
app.security.jwt.expiration-ms=86400000
app.security.https-enabled=false
app.security.cors.allowed-origins=http://localhost:5173

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

services:
  postgres:
    image: ${POSTGRES_IMAGE:-savvas25/k2-pos-postgres:latest}
    pull_policy: always
    env_file:
      - env/postgres.env
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  rest-api:
    image: ${REST_API_IMAGE:-savvas25/k2-pos-rest-api:latest}
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - env/rest-api.env
      - env/postgres.env
    expose:
      - "8080"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${REST_API_PORT:-8080}/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

  web-app:
    image: ${WEB_APP_IMAGE:-savvas25/k2-pos-web-app:latest}
    pull_policy: always
    depends_on:
      rest-api:
        condition: service_healthy
    environment:
      API_URL: http://rest-api:8080
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:


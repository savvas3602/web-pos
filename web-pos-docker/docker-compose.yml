services:
    postgres:
        image: postgres:latest
        env_file:
            - env/postgres.env
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./postgres/create_schema.sql:/docker-entrypoint-initdb.d/create_schema.sql

    rest-api:
        depends_on:
            - postgres
        build:
            context: ../pos-api/
            dockerfile: ../web-pos-docker/rest-api/Dockerfile
        env_file:
            - env/rest-api.env
            - env/postgres.env
        ports:
            - "8080:8080"

        volumes:
            -   ./volumes/rest-api-logs:/app/logs

    web-app:
        depends_on:
            - rest-api
        build:
            context: ../pos-web/
            dockerfile: ../web-pos-docker/web-app/Dockerfile
            args:
                VITE_REST_API_URL: http://localhost:8080
        ports:
            - "80:80"

        volumes:
            -   ./volumes/web-app-logs:/app/logs

volumes:
    postgres_data: